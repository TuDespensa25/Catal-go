        .header-gradient { background: linear-gradient(135deg, #1a936f 0%, #c72c41 100%); }

        }
        @keyframes loading {

        }

<body>
    <div id="root"></div>
    
    <script type="text/babel" src="app.js"></script>
    
    <!-- ===== PWA - SERVICE WORKER, BOTÓN DE INSTALACIÓN Y ACTUALIZACIÓN ===== -->
    <script>
        // ===== 1. SERVICE WORKER CON DETECCIÓN DE ACTUALIZACIONES =====
        let newWorker = null;
        
        if ('serviceWorker' in navigator) {
            // Registrar el Service Worker
            navigator.serviceWorker.register('./service-worker.js').then(reg => {
                console.log('✅ SW registrado');
                
                // Detectar cuando hay una nueva versión
                reg.addEventListener('updatefound', () => {
                    newWorker = reg.installing;
                    console.log('🔄 Nueva versión detectada');
                    
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // Mostrar notificación de actualización
                            mostrarNotificacionActualizacion();
                        }
                    });
                });
            }).catch(err => console.log('❌ SW error:', err));
        }

        // ===== 2. NOTIFICACIÓN DE ACTUALIZACIÓN (ESTILO LOVABLE) =====
        function mostrarNotificacionActualizacion() {
            // Crear contenedor
            const aviso = document.createElement('div');
            aviso.id = 'update-notification';
            
            // Estructura HTML
            aviso.innerHTML = `
                <div style="
                    position: fixed;
                    bottom: 90px;
                    left: 16px;
                    right: 16px;
                    background: #10b981;
                    color: white;
                    border-radius: 16px;
                    padding: 16px;
                    box-shadow: 0 10px 25px rgba(16,185,129,0.3);
                    z-index: 999999;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 12px;
                    animation: slideUp 0.3s ease;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                ">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span style="font-size: 24px;">🔄</span>
                        <div>
                            <div style="font-weight: bold; font-size: 16px;">¡Nueva versión disponible!</div>
                            <div style="font-size: 12px; opacity: 0.9;">Actualiza para ver los cambios</div>
                        </div>
                    </div>
                    <button id="update-now-btn" style="
                        background: white;
                        color: #10b981;
                        border: none;
                        border-radius: 9999px;
                        padding: 8px 16px;
                        font-weight: bold;
                        font-size: 14px;
                        cursor: pointer;
                        transition: all 0.2s;
                    ">Actualizar</button>
                </div>
            `;
            
            document.body.appendChild(aviso);
            
            // Evento del botón Actualizar
            document.getElementById('update-now-btn').onclick = () => {
                if (newWorker) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
                window.location.reload();
            };
            
            // Auto-ocultar después de 30 segundos
            setTimeout(() => {
                if (aviso.parentNode) aviso.remove();
            }, 30000);
        }

        // ===== 3. BOTÓN DE INSTALACIÓN PWA CON CIERRE =====
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('✅ PWA lista para instalar');
        });

        setTimeout(() => {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                return;
            }

            const container = document.createElement('div');
            container.id = 'pwa-install-container';
            container.style.cssText = `
                position: fixed;
                bottom: 90px;
                left: 16px;
                right: 16px;
                z-index: 999999;
                animation: slideUp 0.5s ease;
            `;

            const btn = document.createElement('button');
            btn.id = 'install-pwa-btn';
            btn.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;">
                    <span style="font-size: 24px;">📱</span>
                    <div style="text-align: left; flex: 1;">
                        <div style="font-weight: 700; font-size: 16px;">Instalar TuDespensa.25</div>
                        <div style="font-size: 12px; opacity: 0.9;">App rápida y sin conexión</div>
                    </div>
                </div>
            `;
            
            btn.style.cssText = `
                width: 100%;
                background: linear-gradient(135deg, #22c55e, #f97316);
                color: white;
                border: none;
                border-radius: 16px;
                padding: 16px 20px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                cursor: pointer;
                box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
                border: 1px solid rgba(255,255,255,0.3);
                position: relative;
            `;

            const closeBtn = document.createElement('button');
            closeBtn.id = 'close-pwa-btn';
            closeBtn.innerHTML = '✕';
            closeBtn.style.cssText = `
                position: absolute;
                top: -10px;
                right: -10px;
                width: 32px;
                height: 32px;
                background: white;
                color: #4b5563;
                border: none;
                border-radius: 50%;
                font-size: 18px;
                font-weight: bold;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);
                border: 1px solid #e5e7eb;
                transition: all 0.2s ease;
                z-index: 1000000;
            `;

            closeBtn.onmouseover = () => {
                closeBtn.style.background = '#f3f4f6';
                closeBtn.style.transform = 'scale(1.1)';
            };
            closeBtn.onmouseout = () => {
                closeBtn.style.background = 'white';
                closeBtn.style.transform = 'scale(1)';
            };

            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideUp {
                    from { transform: translateY(100px); opacity: 0; }
                    to { transform: translateY(0); opacity: 1; }
                }
                #install-pwa-btn:hover {
                    transform: scale(1.02);
                    box-shadow: 0 12px 28px rgba(34, 197, 94, 0.5);
                }
            `;
            document.head.appendChild(style);

            btn.onclick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log('📱 Instalación:', outcome);
                    deferredPrompt = null;
                    container.remove();
                } else {
                    alert('📱 Para instalar:\n\nANDROID: Menú → "Instalar aplicación"\niOS: Compartir → "Agregar a pantalla de inicio"');
                    container.remove();
                }
            };

            closeBtn.onclick = (e) => {
                e.stopPropagation();
                container.remove();
                console.log('❌ Cartel de instalación cerrado');
            };

            container.appendChild(btn);
            container.appendChild(closeBtn);
            document.body.appendChild(container);

            setTimeout(() => {
                if (container.parentNode) container.remove();
            }, 120000);
        }, 2000);
    </script>
</body>
