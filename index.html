<body>
    <div id="root"></div>
    
    <script type="text/babel" src="app.js"></script>
    
    <!-- ===== PWA - SERVICE WORKER Y BOTÓN DE INSTALACIÓN ===== -->
    <script>
        // ===== 1. SERVICE WORKER =====
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('✅ SW registrado'))
                    .catch(err => console.log('❌ SW error:', err));
            });
        }

        // ===== 2. CAPTURAR EVENTO DE INSTALACIÓN =====
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('✅ PWA lista para instalar');
        });

        // ===== 3. MOSTRAR BOTÓN DE INSTALACIÓN =====
        setTimeout(() => {
            if (window.matchMedia('(display-mode: standalone)').matches) {
                return;
            }

            const btn = document.createElement('button');
            btn.id = 'install-pwa-btn';
            btn.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                    <span style="font-size: 24px;">📱</span>
                    <div style="text-align: left;">
                        <div style="font-weight: 700; font-size: 16px;">Instalar TuDespensa.25</div>
                        <div style="font-size: 12px; opacity: 0.9;">App rápida y sin conexión</div>
                    </div>
                </div>
            `;
            
            btn.style.cssText = `
                position: fixed;
                bottom: 90px;
                left: 16px;
                right: 16px;
                background: linear-gradient(135deg, #22c55e, #f97316);
                color: white;
                border: none;
                border-radius: 16px;
                padding: 16px 20px;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                cursor: pointer;
                box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
                z-index: 999999;
                border: 1px solid rgba(255,255,255,0.3);
                animation: slideUp 0.5s ease;
            `;

            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideUp {
                    from { transform: translateY(100px); opacity: 0; }
                    to { transform: translateY(0); opacity: 1; }
                }
                #install-pwa-btn:hover {
                    transform: scale(1.02);
                    box-shadow: 0 12px 28px rgba(34, 197, 94, 0.5);
                }
            `;
            document.head.appendChild(style);

            btn.onclick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log('📱 Instalación:', outcome);
                    deferredPrompt = null;
                    btn.remove();
                } else {
                    alert('📱 Para instalar:\n\nANDROID: Menú → "Instalar aplicación"\niOS: Compartir → "Agregar a pantalla de inicio"');
                }
            };

            document.body.appendChild(btn);

            setTimeout(() => {
                if (btn.parentNode) btn.remove();
            }, 60000);
        }, 2000);
    </script>
</body>
